<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="SaturnPath logo">
  <defs>
    <linearGradient id="planetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="60%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="planetClip">
      <circle cx="24" cy="24" r="11"/>
    </clipPath>
  </defs>

  <!-- Saturn ring (behind planet) - left portion -->
  <path
    d="M8 26 Q16 18 24 20"
    stroke="url(#ringGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />

  <!-- Planet body -->
  <circle cx="24" cy="24" r="11" fill="url(#planetGrad)"/>

  <!-- Planet highlight -->
  <circle cx="20" cy="20" r="4" fill="white" opacity="0.15"/>

  <!-- Saturn ring (front) - right portion -->
  <path
    d="M24 20 Q32 18 40 26"
    stroke="url(#ringGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Path/navigation dots on the ring to evoke a study journey -->
  <circle cx="13" cy="22.5" r="1.5" fill="#c084fc" opacity="0.9"/>
  <circle cx="35" cy="22.5" r="1.5" fill="#c084fc" opacity="0.9"/>

  <!-- Small star accents -->
  <circle cx="7" cy="14" r="1" fill="#a855f7" opacity="0.7"/>
  <circle cx="40" cy="10" r="1.2" fill="#c084fc" opacity="0.6"/>
  <circle cx="43" cy="32" r="0.8" fill="#a855f7" opacity="0.5"/>
  <circle cx="5" cy="36" r="0.9" fill="#c084fc" opacity="0.5"/>
</svg>
